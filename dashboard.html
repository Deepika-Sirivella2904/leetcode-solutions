<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - VibrantMart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .dashboard-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding-top: 100px;
        }
        
        .dashboard-header {
            background: var(--primary-gradient);
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
        }
        
        .sidebar {
            background: white;
            border-radius: 15px;
            padding: 1.5rem;
            box-shadow: var(--shadow-lg);
            height: fit-content;
            position: sticky;
            top: 100px;
        }
        
        .sidebar-nav {
            list-style: none;
            padding: 0;
        }
        
        .sidebar-nav li {
            margin-bottom: 0.5rem;
        }
        
        .sidebar-nav a {
            display: flex;
            align-items: center;
            padding: 0.75rem 1rem;
            color: var(--text-dark);
            text-decoration: none;
            border-radius: 10px;
            transition: var(--transition);
        }
        
        .sidebar-nav a:hover,
        .sidebar-nav a.active {
            background: var(--primary-gradient);
            color: white;
        }
        
        .sidebar-nav i {
            margin-right: 0.75rem;
            width: 20px;
        }
        
        .main-content {
            background: white;
            border-radius: 15px;
            padding: 2rem;
            box-shadow: var(--shadow-lg);
            min-height: 600px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px;
            padding: 1.5rem;
            text-align: center;
            transition: var(--transition-bounce);
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-colorful);
        }
        
        .stat-card.success {
            background: var(--success-gradient);
        }
        
        .stat-card.warning {
            background: var(--warning-gradient);
        }
        
        .stat-card.danger {
            background: var(--danger-gradient);
        }
        
        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        
        .order-card {
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            transition: var(--transition);
        }
        
        .order-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }
        
        .order-status {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        
        .status-pending {
            background: #fef3c7;
            color: #92400e;
        }
        
        .status-processing {
            background: #dbeafe;
            color: #1e40af;
        }
        
        .status-shipped {
            background: #e0e7ff;
            color: #3730a3;
        }
        
        .status-delivered {
            background: #d1fae5;
            color: #065f46;
        }
        
        .status-cancelled {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .wishlist-item {
            display: flex;
            align-items: center;
            padding: 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            margin-bottom: 1rem;
            transition: var(--transition);
        }
        
        .wishlist-item:hover {
            box-shadow: var(--shadow-md);
        }
        
        .wishlist-item img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            margin-right: 1rem;
        }
        
        .content-section {
            display: none;
        }
        
        .content-section.active {
            display: block;
        }
        
        .profile-form .form-group {
            margin-bottom: 1.5rem;
        }
        
        .address-card {
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            position: relative;
        }
        
        .address-card.default {
            border-color: var(--vibrant-purple);
            background: rgba(102, 126, 234, 0.05);
        }
        
        .default-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--primary-gradient);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <header id="header" class="header">
        <nav class="navbar navbar-expand-lg navbar-dark">
            <div class="container">
                <a class="navbar-brand" href="index.html">
                    <i class="fas fa-store"></i> VibrantMart
                </a>
                <div class="navbar-icons ms-auto">
                    <button class="icon-btn user-btn" id="user-profile-btn">
                        <i class="fas fa-user"></i>
                    </button>
                    <button class="icon-btn cart-btn" onclick="window.location.href='index.html'">
                        <i class="fas fa-shopping-cart"></i>
                        <span class="badge" id="cart-count">0</span>
                    </button>
                    <button class="icon-btn" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </nav>
    </header>

    <!-- Dashboard Container -->
    <div class="dashboard-container">
        <div class="container">
            <div class="row">
                <!-- Sidebar -->
                <div class="col-lg-3">
                    <div class="sidebar" data-aos="fade-right">
                        <h4 class="mb-4">My Account</h4>
                        <ul class="sidebar-nav">
                            <li>
                                <a href="#" class="nav-link active" data-section="overview">
                                    <i class="fas fa-tachometer-alt"></i>
                                    Dashboard
                                </a>
                            </li>
                            <li>
                                <a href="#" class="nav-link" data-section="orders">
                                    <i class="fas fa-shopping-bag"></i>
                                    My Orders
                                </a>
                            </li>
                            <li>
                                <a href="#" class="nav-link" data-section="wishlist">
                                    <i class="fas fa-heart"></i>
                                    Wishlist
                                </a>
                            </li>
                            <li>
                                <a href="#" class="nav-link" data-section="profile">
                                    <i class="fas fa-user-edit"></i>
                                    Profile Settings
                                </a>
                            </li>
                            <li>
                                <a href="#" class="nav-link" data-section="addresses">
                                    <i class="fas fa-map-marker-alt"></i>
                                    Addresses
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>

                <!-- Main Content -->
                <div class="col-lg-9">
                    <div class="main-content" data-aos="fade-left">
                        <!-- Overview Section -->
                        <div id="overview" class="content-section active">
                            <h2 class="mb-4">Dashboard Overview</h2>
                            
                            <div class="row mb-4">
                                <div class="col-md-3 mb-3">
                                    <div class="stat-card" data-aos="fade-up">
                                        <div class="stat-number" id="total-orders">0</div>
                                        <div>Total Orders</div>
                                    </div>
                                </div>
                                <div class="col-md-3 mb-3">
                                    <div class="stat-card success" data-aos="fade-up" data-aos-delay="100">
                                        <div class="stat-number" id="total-spent">$0</div>
                                        <div>Total Spent</div>
                                    </div>
                                </div>
                                <div class="col-md-3 mb-3">
                                    <div class="stat-card warning" data-aos="fade-up" data-aos-delay="200">
                                        <div class="stat-number" id="pending-orders">0</div>
                                        <div>Pending Orders</div>
                                    </div>
                                </div>
                                <div class="col-md-3 mb-3">
                                    <div class="stat-card danger" data-aos="fade-up" data-aos-delay="300">
                                        <div class="stat-number" id="wishlist-count">0</div>
                                        <div>Wishlist Items</div>
                                    </div>
                                </div>
                            </div>

                            <h3 class="mb-3">Recent Orders</h3>
                            <div id="recent-orders">
                                <!-- Orders will be loaded here -->
                            </div>
                        </div>

                        <!-- Orders Section -->
                        <div id="orders" class="content-section">
                            <h2 class="mb-4">My Orders</h2>
                            <div id="all-orders">
                                <!-- Orders will be loaded here -->
                            </div>
                        </div>

                        <!-- Wishlist Section -->
                        <div id="wishlist" class="content-section">
                            <h2 class="mb-4">My Wishlist</h2>
                            <div id="wishlist-items">
                                <!-- Wishlist items will be loaded here -->
                            </div>
                        </div>

                        <!-- Profile Section -->
                        <div id="profile" class="content-section">
                            <h2 class="mb-4">Profile Settings</h2>
                            <form class="profile-form" id="profile-form">
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="form-group">
                                            <label>First Name</label>
                                            <input type="text" class="form-control" id="first-name" required>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="form-group">
                                            <label>Last Name</label>
                                            <input type="text" class="form-control" id="last-name" required>
                                        </div>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>Email</label>
                                    <input type="email" class="form-control" id="email" required>
                                </div>
                                <div class="form-group">
                                    <label>Phone</label>
                                    <input type="tel" class="form-control" id="phone">
                                </div>
                                <div class="form-group">
                                    <label>Avatar URL</label>
                                    <input type="url" class="form-control" id="avatar">
                                </div>
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save me-2"></i>Save Changes
                                </button>
                            </form>
                        </div>

                        <!-- Addresses Section -->
                        <div id="addresses" class="content-section">
                            <h2 class="mb-4">My Addresses</h2>
                            <button class="btn btn-primary mb-3" onclick="showAddAddressForm()">
                                <i class="fas fa-plus me-2"></i>Add New Address
                            </button>
                            <div id="address-list">
                                <!-- Addresses will be loaded here -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // Initialize AOS
        AOS.init({
            duration: 1000,
            once: true
        });

        // Dashboard functionality
        let currentUser = null;
        let userStats = {};

        // Check authentication
        function checkAuth() {
            const token = localStorage.getItem('vibrantmart-token');
            if (!token) {
                window.location.href = 'index.html';
                return false;
            }
            return true;
        }

        // Load user data
        async function loadUserData() {
            try {
                const token = localStorage.getItem('vibrantmart-token');
                const response = await fetch('/api/users/stats', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    userStats = data.data;
                    updateDashboard();
                }
            } catch (error) {
                console.error('Error loading user data:', error);
            }
        }

        // Update dashboard
        function updateDashboard() {
            document.getElementById('total-orders').textContent = userStats.totalOrders || 0;
            document.getElementById('total-spent').textContent = `$${userStats.totalSpent || 0}`;
            document.getElementById('pending-orders').textContent = userStats.pendingOrders || 0;
            document.getElementById('wishlist-count').textContent = userStats.wishlistCount || 0;
        }

        // Navigation
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                
                // Update active state
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                link.classList.add('active');
                
                // Show corresponding section
                const section = link.dataset.section;
                document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
                document.getElementById(section).classList.add('active');
                
                // Load section data
                loadSectionData(section);
            });
        });

        // Load section data
        async function loadSectionData(section) {
            switch(section) {
                case 'orders':
                    await loadOrders();
                    break;
                case 'wishlist':
                    await loadWishlist();
                    break;
                case 'profile':
                    await loadProfile();
                    break;
                case 'addresses':
                    await loadAddresses();
                    break;
            }
        }

        // Load orders
        async function loadOrders() {
            try {
                const token = localStorage.getItem('vibrantmart-token');
                const response = await fetch('/api/users/orders', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    displayOrders(data.data);
                }
            } catch (error) {
                console.error('Error loading orders:', error);
            }
        }

        // Display orders
        function displayOrders(orders) {
            const ordersContainer = document.getElementById('all-orders');
            const recentOrdersContainer = document.getElementById('recent-orders');
            
            if (orders.length === 0) {
                ordersContainer.innerHTML = '<p>No orders found.</p>';
                recentOrdersContainer.innerHTML = '<p>No recent orders.</p>';
                return;
            }

            const orderHtml = orders.map(order => `
                <div class="order-card">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <h5>Order #${order.orderNumber}</h5>
                            <p class="text-muted">${new Date(order.createdAt).toLocaleDateString()}</p>
                            <p>Total: $${order.total}</p>
                        </div>
                        <span class="order-status status-${order.status}">${order.status}</span>
                    </div>
                    <div class="mt-3">
                        <button class="btn btn-sm btn-outline-primary" onclick="viewOrder('${order._id}')">
                            View Details
                        </button>
                    </div>
                </div>
            `).join('');

            ordersContainer.innerHTML = orderHtml;
            recentOrdersContainer.innerHTML = orders.slice(0, 3).map(order => `
                <div class="order-card">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <h6>Order #${order.orderNumber}</h6>
                            <p class="text-muted mb-1">${new Date(order.createdAt).toLocaleDateString()}</p>
                            <p class="mb-0">$${order.total}</p>
                        </div>
                        <span class="order-status status-${order.status}">${order.status}</span>
                    </div>
                </div>
            `).join('');
        }

        // Load wishlist
        async function loadWishlist() {
            try {
                const token = localStorage.getItem('vibrantmart-token');
                const response = await fetch('/api/auth/wishlist', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    displayWishlist(data.data);
                }
            } catch (error) {
                console.error('Error loading wishlist:', error);
            }
        }

        // Display wishlist
        function displayWishlist(wishlist) {
            const container = document.getElementById('wishlist-items');
            
            if (wishlist.length === 0) {
                container.innerHTML = '<p>Your wishlist is empty.</p>';
                return;
            }

            container.innerHTML = wishlist.map(item => `
                <div class="wishlist-item">
                    <img src="${item.thumbnail}" alt="${item.name}">
                    <div class="flex-grow-1">
                        <h6>${item.name}</h6>
                        <p class="text-muted mb-0">$${item.price}</p>
                    </div>
                    <div>
                        <button class="btn btn-sm btn-primary" onclick="addToCart('${item._id}')">
                            <i class="fas fa-shopping-cart me-1"></i>Add to Cart
                        </button>
                        <button class="btn btn-sm btn-outline-danger" onclick="removeFromWishlist('${item._id}')">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // Load profile
        async function loadProfile() {
            try {
                const token = localStorage.getItem('vibrantmart-token');
                const response = await fetch('/api/auth/profile', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    const user = data.data;
                    document.getElementById('first-name').value = user.name.split(' ')[0] || '';
                    document.getElementById('last-name').value = user.name.split(' ')[1] || '';
                    document.getElementById('email').value = user.email;
                    document.getElementById('phone').value = user.phone || '';
                    document.getElementById('avatar').value = user.avatar || '';
                }
            } catch (error) {
                console.error('Error loading profile:', error);
            }
        }

        // Load addresses
        async function loadAddresses() {
            try {
                const token = localStorage.getItem('vibrantmart-token');
                const response = await fetch('/api/auth/profile', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    displayAddresses(data.data.addresses || []);
                }
            } catch (error) {
                console.error('Error loading addresses:', error);
            }
        }

        // Display addresses
        function displayAddresses(addresses) {
            const container = document.getElementById('address-list');
            
            if (addresses.length === 0) {
                container.innerHTML = '<p>No addresses found.</p>';
                return;
            }

            container.innerHTML = addresses.map(address => `
                <div class="address-card ${address.isDefault ? 'default' : ''}">
                    ${address.isDefault ? '<span class="default-badge">Default</span>' : ''}
                    <h6>${address.type.charAt(0).toUpperCase() + address.type.slice(1)}</h6>
                    <p class="mb-1">${address.street}</p>
                    <p class="mb-1">${address.city}, ${address.state} ${address.zipCode}</p>
                    <p class="mb-0">${address.country}</p>
                    <div class="mt-3">
                        <button class="btn btn-sm btn-outline-primary" onclick="editAddress('${address._id}')">
                            <i class="fas fa-edit me-1"></i>Edit
                        </button>
                        ${!address.isDefault ? `<button class="btn btn-sm btn-outline-success" onclick="setDefaultAddress('${address._id}')">
                            <i class="fas fa-check me-1"></i>Set Default
                        </button>` : ''}
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteAddress('${address._id}')">
                            <i class="fas fa-trash me-1"></i>Delete
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // Logout
        function logout() {
            localStorage.removeItem('vibrantmart-token');
            window.location.href = 'index.html';
        }

        // Initialize
        if (checkAuth()) {
            loadUserData();
            loadOrders();
        }
    </script>
</body>
</html>
